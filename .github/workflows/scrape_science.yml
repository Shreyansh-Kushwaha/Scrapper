name: IXL Science Scraper (Year 4-6)

on:
  workflow_dispatch:       # run manually from GitHub UI
  schedule:
    - cron: '0 4 * * 0'   # every Sunday at 4am UTC

jobs:

  # ── YEAR 4 ────────────────────────────────────────────────────────────────

  setup-year4:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: pip install -r requirements.txt && playwright install chromium && playwright install-deps chromium
      - name: Discover skills and split into 3 batches
        run: |
          mkdir -p output/science/year-4
          python3 -c "
          import json, subprocess
          result = subprocess.run(
              ['python3','ixl_scraper_ui.py',
               '--subject','science','--year','year-4',
               '--username','${{ secrets.IXL_USERNAME }}',
               '--password','${{ secrets.IXL_PASSWORD }}',
               '--discover-only','--headless'],
              capture_output=True, text=True
          )
          skills = json.loads([l[8:] for l in result.stdout.splitlines() if l.startswith('[SKILLS]')][0])
          open('output/science/year-4/_batch_0.json','w').write(json.dumps(skills[0::3]))
          open('output/science/year-4/_batch_1.json','w').write(json.dumps(skills[1::3]))
          open('output/science/year-4/_batch_2.json','w').write(json.dumps(skills[2::3]))
          print(f'Batch 0: {len(skills[0::3])} | Batch 1: {len(skills[1::3])} | Batch 2: {len(skills[2::3])}')
          "
      - uses: actions/upload-artifact@v4
        with:
          name: science-year4-batches
          path: output/science/year-4/_batch_*.json

  workers-year4:
    needs: setup-year4
    runs-on: ubuntu-latest
    strategy:
      matrix:
        worker: [0, 1, 2]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: pip install -r requirements.txt && playwright install chromium && playwright install-deps chromium
      - uses: actions/download-artifact@v4
        with:
          name: science-year4-batches
          path: output/science/year-4/
      - name: Restore checkpoint cache
        uses: actions/cache@v4
        with:
          path: output/science/year-4/worker_${{ matrix.worker }}
          key: science-year4-worker${{ matrix.worker }}-checkpoint
          restore-keys: science-year4-worker${{ matrix.worker }}-checkpoint
      - name: Run worker ${{ matrix.worker }}
        run: |
          mkdir -p output/science/year-4/worker_${{ matrix.worker }}
          python3 ixl_scraper_ui.py \
            --subject science --year year-4 \
            --username "${{ secrets.IXL_USERNAME }}" \
            --password "${{ secrets.IXL_PASSWORD }}" \
            --output-dir "output/science/year-4/worker_${{ matrix.worker }}" \
            --skills-file "output/science/year-4/_batch_${{ matrix.worker }}.json" \
            --mcq-only --headless
      - name: Save checkpoint cache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: output/science/year-4/worker_${{ matrix.worker }}
          key: science-year4-worker${{ matrix.worker }}-checkpoint
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: science-year4-worker${{ matrix.worker }}-results
          path: output/science/year-4/worker_${{ matrix.worker }}/

  # ── YEAR 5 ────────────────────────────────────────────────────────────────

  setup-year5:
