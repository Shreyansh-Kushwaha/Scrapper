          skills = json.loads([l[8:] for l in result.stdout.splitlines() if l.startswith('[SKILLS]')][0])
          open('output/science/year-5/_batch_0.json','w').write(json.dumps(skills[0::3]))
          open('output/science/year-5/_batch_1.json','w').write(json.dumps(skills[1::3]))
          open('output/science/year-5/_batch_2.json','w').write(json.dumps(skills[2::3]))
          print(f'Batch 0: {len(skills[0::3])} | Batch 1: {len(skills[1::3])} | Batch 2: {len(skills[2::3])}')
          "
      - uses: actions/upload-artifact@v4
        with:
          name: science-year5-batches
          path: output/science/year-5/_batch_*.json

  workers-year5:
