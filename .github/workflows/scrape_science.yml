      - uses: actions/download-artifact@v4
        with:
          name: science-year5-batches
          path: output/science/year-5/
      - name: Restore checkpoint cache
        uses: actions/cache@v4
        with:
          path: output/science/year-5/worker_${{ matrix.worker }}
          key: science-year5-worker${{ matrix.worker }}-checkpoint
          restore-keys: science-year5-worker${{ matrix.worker }}-checkpoint
      - name: Run worker ${{ matrix.worker }}
        run: |
          mkdir -p output/science/year-5/worker_${{ matrix.worker }}
          python3 ixl_scraper_ui.py \
            --subject science --year year-5 \
            --username "${{ secrets.IXL_USERNAME }}" \
            --password "${{ secrets.IXL_PASSWORD }}" \
            --output-dir "output/science/year-5/worker_${{ matrix.worker }}" \
            --skills-file "output/science/year-5/_batch_${{ matrix.worker }}.json" \
            --mcq-only --headless
      - name: Save checkpoint cache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: output/science/year-5/worker_${{ matrix.worker }}
          key: science-year5-worker${{ matrix.worker }}-checkpoint
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: science-year5-worker${{ matrix.worker }}-results
          path: output/science/year-5/worker_${{ matrix.worker }}/

  # ── YEAR 6 ────────────────────────────────────────────────────────────────

  setup-year6:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
